# Voice Relay — Local Development
# Relay mode (external Speaches) + optional local Speaches

services:
  # The Voice Relay server
  voice-relay:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - voice-relay-data:/data
    environment:
      - OPENCLAW_HOST=0.0.0.0
      - OPENCLAW_PORT=8765
      # Phase 2: SQLite persistence and admin auth
      - OPENCLAW_DB_PATH=/data/voice_relay.db
      - OPENCLAW_MASTER_KEY=${OPENCLAW_MASTER_KEY:-change-me-in-production}
      # Point at your Speaches instance for STT/TTS
      - VSAAS_URL=${VSAAS_URL:-http://speaches:8000}
      - VSAAS_API_KEY=${VSAAS_API_KEY:-}
      # Point at your AI agent backend
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Settings
      - OPENCLAW_TTS_MODEL=${OPENCLAW_TTS_MODEL:-kokoro}
      - OPENCLAW_TTS_VOICE=${OPENCLAW_TTS_VOICE:-af_heart}
      - OPENCLAW_REQUIRE_AUTH=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Optional: local Speaches instance
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - KOKORO__ENABLED=true
      - SERVE__API_KEY=${SPEACHES_API_KEY:-}
    volumes:
      - speaches-models:/root/.cache/huggingface
    profiles:
      - local-stt  # Only start with: docker compose --profile local-stt up
    restart: unless-stopped

volumes:
  voice-relay-data:
  speaches-models:
