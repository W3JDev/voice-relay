<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Voice</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #ff6b35;
            --accent-dim: rgba(255, 107, 53, 0.15);
            --accent-glow: rgba(255, 107, 53, 0.4);
            --gold: #f7c94b;
            --cyan: #4fc3f7;
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-surface: rgba(255, 255, 255, 0.04);
            --bg-surface-hover: rgba(255, 255, 255, 0.07);
            --text-primary: #e8e8e8;
            --text-secondary: #999;
            --text-muted: #666;
            --text-dim: #555;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --danger: #ff4444;
            --success: #4caf50;
            --warning: #ffb300;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Layout Shell ===== */
        .app-layout {
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            min-height: 100vh;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-brand h1 {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--bg-surface);
            border-radius: 20px;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background var(--transition-normal);
        }

        .connection-dot.connected { background: var(--success); }
        .connection-dot.reconnecting {
            background: var(--warning);
            animation: blink 1s infinite;
        }
        .connection-dot.disconnected { background: var(--danger); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition-fast);
        }

        .icon-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-surface-hover);
        }

        /* ===== Settings Panel ===== */
        .settings-panel {
            display: none;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 12px;
            animation: slideDown 200ms ease;
        }

        .settings-panel.open {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-panel h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .settings-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .settings-field.full-width {
            grid-column: 1 / -1;
        }

        .settings-field label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .settings-field input,
        .settings-field select {
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .settings-field input:focus,
        .settings-field select:focus {
            border-color: var(--accent);
        }

        .settings-field input::placeholder {
            color: var(--text-dim);
        }

        .settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 14px;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-sm:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-sm.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-sm.primary:hover {
            background: #e55a2b;
        }

        /* ===== Main Content ===== */
        .main-content {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 16px;
            padding: 16px 0;
            overflow: hidden;
        }

        /* ===== Voice Control Area ===== */
        .voice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 20px 0;
        }

        /* Waveform Canvas */
        .waveform-container {
            width: 100%;
            max-width: 400px;
            height: 64px;
            position: relative;
        }

        .waveform-canvas {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-md);
            background: var(--bg-surface);
        }

        /* Voice Button */
        .voice-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent) 0%, #e55a2b 100%);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: 0 8px 32px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }

        .voice-button:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 44px var(--accent-glow);
        }

        .voice-button:active {
            transform: scale(0.96);
        }

        .voice-button.listening {
            animation: pulse 1.5s ease-in-out infinite;
            background: linear-gradient(135deg, #e55a2b 0%, #c44a22 100%);
        }

        .voice-button.listening::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            animation: ring-expand 1.5s ease-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px var(--accent-glow); }
            50% { box-shadow: 0 8px 52px rgba(255, 107, 53, 0.55); }
        }

        @keyframes ring-expand {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* VAD Indicator */
        .vad-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-dim);
            transition: background var(--transition-fast);
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .vad-dot.active {
            background: var(--success);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
        }

        /* Controls Row */
        .voice-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .continuous-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #333;
            border-radius: 24px;
            transition: background var(--transition-normal);
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform var(--transition-normal);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        .toggle-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .status-line {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: color var(--transition-fast);
            min-height: 1.3em;
        }

        .status-line.active {
            color: var(--accent);
        }

        /* Barge-in Flash */
        .barge-in-flash {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--warning);
            padding: 4px 10px;
            background: rgba(255, 179, 0, 0.1);
            border-radius: var(--radius-sm);
            animation: fadeInOut 1.5s ease forwards;
        }

        .barge-in-flash.visible {
            display: inline-flex;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }

        /* ===== Transcript Panel ===== */
        .transcript-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            min-height: 200px;
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }

        .transcript-header h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .transcript-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            line-height: 1.55;
            word-wrap: break-word;
            animation: msgIn 200ms ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--accent-dim);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }

        .msg.assistant {
            align-self: flex-start;
            background: rgba(79, 195, 247, 0.1);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .msg.partial {
            opacity: 0.6;
            font-style: italic;
        }

        .msg .speaker {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
            display: block;
        }

        .msg.user .speaker { color: var(--accent); }
        .msg.assistant .speaker { color: var(--cyan); }

        /* Markdown inside messages */
        .msg code {
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.85em;
        }

        .msg code.block {
            display: block;
            padding: 8px 10px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.3);
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .msg a {
            color: var(--accent);
            text-decoration: none;
        }

        .msg a:hover {
            text-decoration: underline;
        }

        .msg strong { font-weight: 600; }
        .msg em { font-style: italic; }

        /* ===== Footer ===== */
        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        .session-id {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            opacity: 0.7;
        }

        /* ===== Error Bar ===== */
        .error-bar {
            display: none;
            padding: 8px 14px;
            background: rgba(255, 68, 68, 0.12);
            border: 1px solid rgba(255, 68, 68, 0.25);
            border-radius: var(--radius-sm);
            color: var(--danger);
            font-size: 0.82rem;
            margin-top: 8px;
        }

        .error-bar.visible {
            display: block;
        }

        /* ===== Keyboard Hint ===== */
        .keyboard-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .keyboard-hint kbd {
            display: inline-block;
            padding: 1px 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.8em;
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .app-layout {
                padding: 0 10px;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .header-brand h1 {
                font-size: 1.1rem;
            }

            .voice-button {
                width: 100px;
                height: 100px;
                font-size: 0.9rem;
            }

            .transcript-body {
                max-height: 300px;
            }

            .msg {
                max-width: 90%;
            }
        }

        @media (max-width: 380px) {
            .voice-button {
                width: 88px;
                height: 88px;
                font-size: 0.8rem;
            }

            .waveform-container {
                height: 48px;
            }
        }

        /* ===== Scrollbar ===== */
        .transcript-body::-webkit-scrollbar {
            width: 5px;
        }

        .transcript-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .transcript-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .transcript-body::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <h1>OpenClaw Voice</h1>
                <div class="connection-badge" id="connBadge">
                    <span class="connection-dot" id="connDot"></span>
                    <span id="connLabel">Connecting</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="settingsToggle" title="Settings" aria-label="Settings">
                    &#9881;
                </button>
                <button class="icon-btn" id="clearBtn" title="Clear conversation" aria-label="Clear conversation">
                    &#128465;
                </button>
            </div>
        </header>

        <!-- Settings Panel (collapsed by default) -->
        <div class="settings-panel" id="settingsPanel">
            <h3>Voice Settings</h3>
            <div class="settings-grid">
                <div class="settings-field full-width">
                    <label for="settingAgent">AI Agent</label>
                    <select id="settingAgent">
                        <option value="">Loading agents...</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="settingVoice">Voice</label>
                    <select id="settingVoice">
                        <option value="af_heart">Heart (warm, default)</option>
                        <option value="af_nova">Nova (clear)</option>
                        <option value="af_sky">Sky (bright)</option>
                        <option value="af_bella">Bella (soft)</option>
                        <option value="af_sarah">Sarah (natural)</option>
                        <option value="af_nicole">Nicole (smooth)</option>
                        <option value="am_adam">Adam (male, deep)</option>
                        <option value="am_michael">Michael (male, warm)</option>
                        <option value="bf_emma">Emma (British)</option>
                        <option value="bm_george">George (British male)</option>
                    </select>
                </div>
                <div class="settings-field">
                    <label for="settingApiKey">API Key <span style="font-weight:300;color:var(--text-muted)">(optional)</span></label>
                    <input type="password" id="settingApiKey" placeholder="vr_live_..." />
                </div>
            </div>
            <div class="settings-actions">
                <button class="btn-sm" id="settingsCancel">Cancel</button>
                <button class="btn-sm primary" id="settingsSave">Save &amp; Reconnect</button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Voice Control Area -->
            <section class="voice-area">
                <div class="waveform-container">
                    <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
                </div>

                <button class="voice-button" id="voiceBtn">
                    Tap to Talk
                    <span class="vad-dot" id="vadDot"></span>
                </button>

                <div class="voice-controls">
                    <div class="continuous-toggle">
                        <label class="toggle-switch">
                            <input type="checkbox" id="continuousMode" checked />
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="toggle-label">Continuous</span>
                    </div>
                    <span class="barge-in-flash" id="bargeInFlash">Interrupted</span>
                </div>

                <p class="status-line" id="statusLine">Ready</p>
                <p class="keyboard-hint"><kbd>Space</kbd> toggle recording</p>
            </section>

            <!-- Transcript Panel -->
            <section class="transcript-panel">
                <div class="transcript-header">
                    <h3>Conversation</h3>
                </div>
                <div class="transcript-body" id="transcriptBody"></div>
            </section>

            <div class="error-bar" id="errorBar"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div>
                Built by <a href="https://purplehorizons.io" target="_blank" rel="noopener noreferrer">Purple Horizons</a>
                &middot;
                <a href="https://github.com/Purple-Horizons/openclaw-voice" target="_blank" rel="noopener noreferrer">GitHub</a>
            </div>
            <span class="session-id" id="sessionIdLabel"></span>
        </footer>
    </div>

    <script>
    (function () {
        'use strict';

        /* ================================================================
         *  DOM References
         * ================================================================ */
        const voiceBtn        = document.getElementById('voiceBtn');
        const statusLine      = document.getElementById('statusLine');
        const transcriptBody  = document.getElementById('transcriptBody');
        const errorBar        = document.getElementById('errorBar');
        const clearBtn        = document.getElementById('clearBtn');
        const continuousToggle = document.getElementById('continuousMode');
        const connDot         = document.getElementById('connDot');
        const connLabel       = document.getElementById('connLabel');
        const vadDot          = document.getElementById('vadDot');
        const bargeInFlash    = document.getElementById('bargeInFlash');
        const sessionIdLabel  = document.getElementById('sessionIdLabel');
        const waveformCanvas  = document.getElementById('waveformCanvas');
        const settingsToggle  = document.getElementById('settingsToggle');
        const settingsPanel   = document.getElementById('settingsPanel');
        const settingsCancel  = document.getElementById('settingsCancel');
        const settingsSave    = document.getElementById('settingsSave');

        /* Settings inputs */
        const settingAgent    = document.getElementById('settingAgent');
        const settingApiKey   = document.getElementById('settingApiKey');
        const settingVoice    = document.getElementById('settingVoice');

        /* Removed in Phase 2 (agent routing replaces these) */
        const settingUrl      = { value: '' };  // stub for compat
        const settingBackend  = { value: '' };   // stub for compat
        const settingModel    = { value: '' };   // stub for compat

        /* ================================================================
         *  State
         * ================================================================ */
        let ws                  = null;
        let audioContext         = null;
        let mediaStream          = null;
        let workletNode          = null;
        let sourceNode           = null;
        let analyserNode         = null;
        let isRecording          = false;
        let continuousMode       = true;
        let sessionId            = null;
        let reconnectTimer       = null;
        let reconnectDelay       = 1000;
        const MAX_RECONNECT_DELAY = 16000;

        /* Audio playback state -- ring-buffer approach */
        let playbackCtx          = null;
        let playbackWorklet      = null;
        let audioRingBuffer      = null;   /* SharedArrayBuffer or Float32Array */
        let ringWritePos         = 0;
        let ringReadPos          = 0;
        const RING_BUFFER_SECONDS = 30;    /* 30 s at 24 kHz = 720000 samples */
        let ringBufferSize       = 0;
        let isPlayingAudio       = false;
        let currentPlaybackSource = null;  /* kept for barge-in compat */
        let currentGainNode      = null;
        let prebufferThreshold   = 0;      /* samples to accumulate before starting */
        let prebufferReached     = false;

        /* Transcript state */
        let currentResponseEl    = null;
        let streamingText        = '';
        let partialTranscriptEl  = null;

        /* Waveform */
        let waveformAnimId       = null;
        const waveCtx            = waveformCanvas.getContext('2d');
        let waveformData         = new Float32Array(128);

        /* ================================================================
         *  Settings Persistence
         * ================================================================ */
        const SETTINGS_KEY = 'openclaw_settings';

        function loadSettings() {
            try {
                const raw = localStorage.getItem(SETTINGS_KEY);
                if (raw) {
                    const s = JSON.parse(raw);
                    if (s.apiKey)   settingApiKey.value   = s.apiKey;
                    if (s.voice)    settingVoice.value    = s.voice;
                    if (s.agentId)  settingAgent.dataset.savedAgentId = s.agentId;
                }
            } catch (_) { /* ignore */ }

            /* Also check URL params for API key (upstream compat) */
            const urlParams = new URLSearchParams(window.location.search);
            const paramKey = urlParams.get('api_key');
            if (paramKey && !settingApiKey.value) {
                settingApiKey.value = paramKey;
            }

            /* Check URL params for agent_id */
            const paramAgent = urlParams.get('agent');
            if (paramAgent) {
                settingAgent.dataset.savedAgentId = paramAgent;
            }

            /* Fetch available agents from server */
            fetchAgentList();
        }

        function saveSettings() {
            const s = {
                apiKey:  settingApiKey.value.trim(),
                voice:   settingVoice.value,
                agentId: settingAgent.value,
            };
            try {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
            } catch (_) { /* sandboxed iframe - ignore */ }
        }

        async function fetchAgentList() {
            try {
                var protocol = window.location.protocol;
                var agentsUrl = protocol + '//' + window.location.host + '/agents';
                var resp = await fetch(agentsUrl);
                var agents = await resp.json();

                settingAgent.innerHTML = '';

                if (agents.length === 0) {
                    settingAgent.innerHTML = '<option value="">No agents configured</option>';
                    return;
                }

                agents.forEach(function(a) {
                    var opt = document.createElement('option');
                    opt.value = a.id;
                    opt.textContent = a.name + (a.is_default ? ' (default)' : '');
                    if (a.is_default) opt.selected = true;
                    settingAgent.appendChild(opt);
                });

                /* Restore saved selection */
                var saved = settingAgent.dataset.savedAgentId;
                if (saved) {
                    for (var i = 0; i < settingAgent.options.length; i++) {
                        if (settingAgent.options[i].value === saved) {
                            settingAgent.selectedIndex = i;
                            break;
                        }
                    }
                }
            } catch (err) {
                console.warn('Failed to fetch agents:', err);
                settingAgent.innerHTML = '<option value="">Could not load agents</option>';
            }
        }

        function getApiKey() {
            return settingApiKey.value.trim();
        }

        /* ================================================================
         *  UI Helpers
         * ================================================================ */
        function setStatus(text, active) {
            statusLine.textContent = text;
            statusLine.classList.toggle('active', !!active);
        }

        function setConnection(state) {
            connDot.className = 'connection-dot ' + state;
            const labels = { connected: 'Connected', reconnecting: 'Reconnecting', disconnected: 'Disconnected' };
            connLabel.textContent = labels[state] || state;
        }

        function showError(msg) {
            errorBar.textContent = msg;
            errorBar.classList.add('visible');
        }

        function clearError() {
            errorBar.textContent = '';
            errorBar.classList.remove('visible');
        }

        function flashBargeIn() {
            bargeInFlash.classList.remove('visible');
            /* Force reflow to restart animation */
            void bargeInFlash.offsetWidth;
            bargeInFlash.classList.add('visible');
            setTimeout(function () {
                bargeInFlash.classList.remove('visible');
            }, 1600);
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            return text
                /* Code blocks */
                .replace(/```([\s\S]*?)```/g, function (_, code) {
                    return '<code class="block">' + escapeHtml(code.trim()) + '</code>';
                })
                /* Inline code */
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                /* Bold */
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                /* Italic */
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                /* Headers to bold */
                .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
                /* Links */
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
                /* Newlines */
                .replace(/\n/g, '<br>');
        }

        /* ================================================================
         *  Transcript Management
         * ================================================================ */
        function addMessage(role, text, options) {
            options = options || {};
            var el = document.createElement('div');
            el.className = 'msg ' + role;
            if (options.partial) el.classList.add('partial');

            var speakerLabel = role === 'user' ? 'You' : 'AI';
            var rendered = role === 'assistant' ? renderMarkdown(text) : escapeHtml(text);
            el.innerHTML = '<span class="speaker">' + speakerLabel + '</span>' + rendered;

            transcriptBody.appendChild(el);
            transcriptBody.scrollTop = transcriptBody.scrollHeight;
            return el;
        }

        function updatePartialTranscript(text) {
            if (!partialTranscriptEl) {
                partialTranscriptEl = addMessage('user', text, { partial: true });
            } else {
                var rendered = escapeHtml(text);
                partialTranscriptEl.innerHTML = '<span class="speaker">You</span>' + rendered;
                transcriptBody.scrollTop = transcriptBody.scrollHeight;
            }
        }

        function finalizePartialTranscript(text) {
            if (partialTranscriptEl) {
                partialTranscriptEl.classList.remove('partial');
                var rendered = escapeHtml(text);
                partialTranscriptEl.innerHTML = '<span class="speaker">You</span>' + rendered;
                transcriptBody.scrollTop = transcriptBody.scrollHeight;
                partialTranscriptEl = null;
            } else {
                addMessage('user', text);
            }
        }

        function updateStreamingResponse(text) {
            if (!currentResponseEl) {
                currentResponseEl = addMessage('assistant', text);
            } else {
                currentResponseEl.innerHTML = '<span class="speaker">AI</span>' + renderMarkdown(text);
                transcriptBody.scrollTop = transcriptBody.scrollHeight;
            }
        }

        /* ================================================================
         *  WebSocket Connection
         * ================================================================ */
        var pageVisible = true;          /* track tab visibility */
        var intentionalClose = false;    /* suppress reconnect after settings save */
        var lastPongTime = 0;            /* track server liveness */

        function buildWsUrl() {
            var custom = settingUrl.value.trim();
            if (custom) return custom;

            var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var basePath = window.location.pathname.replace(/\/$/, '');
            var wsPath = basePath ? basePath + '/ws' : '/ws';
            var apiKey = getApiKey();
            var base = protocol + '//' + window.location.host + wsPath;
            return apiKey ? base + '?api_key=' + encodeURIComponent(apiKey) : base;
        }

        function connect() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                intentionalClose = true;
                ws.close();
            }

            var url = buildWsUrl();
            setConnection('reconnecting');
            clearError();

            try {
                ws = new WebSocket(url);
            } catch (e) {
                showError('Invalid WebSocket URL: ' + e.message);
                setConnection('disconnected');
                return;
            }

            ws.onopen = function () {
                setConnection('connected');
                clearError();
                reconnectDelay = 1000;
                intentionalClose = false;
                lastPongTime = Date.now();
                console.log('[ws] connected');

                /* If we have a previous session, attempt reconnect */
                if (sessionId) {
                    wsSend({ type: 'reconnect', session_id: sessionId });
                }

                /* Send agent selection to server */
                var selectedAgent = settingAgent.value;
                if (selectedAgent) {
                    wsSend({ type: 'config', agent_id: selectedAgent });
                }
            };

            ws.onclose = function (event) {
                setConnection('disconnected');
                stopRecordingCleanup();

                console.log('[ws] closed: code=' + event.code + ' reason=' + (event.reason || '(none)') + ' wasClean=' + event.wasClean);

                if (event.code === 4001) {
                    setStatus('API key required');
                    showError('This server requires an API key. Set it in Settings or add ?api_key=YOUR_KEY to the URL.');
                    return;
                }
                if (event.code === 4002) {
                    setStatus('Invalid API key');
                    showError('Your API key is invalid or expired.');
                    return;
                }
                if (event.code === 4003) {
                    setStatus('Rate limited');
                    showError('Too many requests. Please wait and try again.');
                    return;
                }
                if (event.code === 4004) {
                    setStatus('Quota exceeded');
                    showError('Monthly minute quota exceeded for this API key.');
                    return;
                }

                /* Don't auto-reconnect if the page is hidden (laptop sleep, tab switch) */
                if (!pageVisible) {
                    setStatus('Paused - will reconnect when tab is visible');
                    return;
                }

                /* Intentional close (settings save) -- reconnect immediately */
                if (intentionalClose) {
                    intentionalClose = false;
                    return;
                }

                /* Exponential backoff reconnect */
                var delaySec = Math.round(reconnectDelay / 1000);
                setStatus('Disconnected - reconnecting in ' + delaySec + 's');
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
            };

            ws.onerror = function () {
                console.error('[ws] error event');
                showError('WebSocket error. Is the server running?');
            };

            ws.onmessage = function (event) {
                var msg;
                try {
                    msg = JSON.parse(event.data);
                } catch (_) {
                    return;
                }
                handleMessage(msg);
            };
        }

        /* Pause/resume WebSocket on tab visibility change */
        document.addEventListener('visibilitychange', function () {
            pageVisible = !document.hidden;
            if (pageVisible) {
                /* Tab became visible - reconnect if disconnected */
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    console.log('[ws] tab visible, reconnecting...');
                    reconnectDelay = 1000;
                    clearTimeout(reconnectTimer);
                    connect();
                }
            }
        });

        function wsSend(obj) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(obj));
            }
        }

        /* ================================================================
         *  Message Handler
         * ================================================================ */
        function handleMessage(msg) {
            switch (msg.type) {
                case 'session_start':
                    sessionId = msg.session_id || null;
                    if (sessionId) {
                        sessionIdLabel.textContent = 'session: ' + sessionId.slice(0, 8);
                        sessionIdLabel.title = sessionId;
                    }
                    break;

                case 'config_ack':
                    if (msg.agent_name) {
                        setStatus('Connected to ' + msg.agent_name);
                    }
                    break;

                case 'error':
                    if (msg.message) {
                        showError(msg.message);
                    }
                    break;

                case 'listening_started':
                    setStatus(continuousMode ? 'Listening (continuous)...' : 'Listening...', true);
                    break;

                case 'listening_stopped':
                    setStatus('Processing...');
                    break;

                case 'transcript':
                    if (msg.final === false) {
                        /* Partial transcript - show dimmed/italic, updating in place */
                        updatePartialTranscript(msg.text);
                    } else {
                        /* Final transcript */
                        finalizePartialTranscript(msg.text);
                        setStatus('Getting response...');
                        /* Reset streaming state for upcoming response */
                        streamingText = '';
                        currentResponseEl = null;
                        /* Flush ring buffer for the new response */
                        ringWritePos = 0;
                        ringReadPos = 0;
                        prebufferReached = false;
                    }
                    break;

                case 'response_text':
                    /* Legacy non-streaming response */
                    addMessage('assistant', msg.text);
                    break;

                case 'response_chunk':
                    streamingText += msg.text;
                    updateStreamingResponse(streamingText);
                    setStatus('Speaking...', true);
                    break;

                case 'audio_chunk':
                    queueAudioChunk(msg.data, msg.sample_rate);
                    break;

                case 'response_complete':
                    if (currentResponseEl && msg.text) {
                        currentResponseEl.innerHTML = '<span class="speaker">AI</span>' + renderMarkdown(msg.text);
                    }
                    break;

                case 'audio_response':
                    /* Legacy non-streaming audio */
                    queueAudioChunk(msg.data, msg.sample_rate);
                    setStatus('Speaking...');
                    break;

                case 'interrupted':
                    handleBargeIn();
                    break;

                case 'vad_status':
                    vadDot.classList.toggle('active', !!msg.speech_detected);
                    break;

                case 'pong':
                    lastPongTime = Date.now();
                    break;

                default:
                    break;
            }
        }

        /* ================================================================
         *  Barge-in Handling
         * ================================================================ */
        function handleBargeIn() {
            /* Immediately stop all audio playback */
            if (playbackWorklet) {
                try { playbackWorklet.disconnect(); } catch (_) {}
                playbackWorklet = null;
            }
            isPlayingAudio = false;
            currentPlaybackSource = null;
            currentGainNode = null;

            /* Flush the ring buffer */
            ringWritePos = 0;
            ringReadPos = 0;
            prebufferReached = false;

            flashBargeIn();
            setStatus(continuousMode ? 'Listening (continuous)...' : 'Listening...', true);
        }

        /* ================================================================
         *  Audio Playback (queue-based with crossfade)
         * ================================================================ */
        function ensurePlaybackContext(sampleRate) {
            if (!playbackCtx || playbackCtx.state === 'closed') {
                /* Let the browser pick its native sample rate for best quality.
                   We resample from 24 kHz to native rate when writing the ring buffer. */
                playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
                ringBufferSize = Math.ceil(RING_BUFFER_SECONDS * playbackCtx.sampleRate);
                audioRingBuffer = new Float32Array(ringBufferSize);
                ringWritePos = 0;
                ringReadPos = 0;
                prebufferReached = false;
                /* Pre-buffer: accumulate 400ms before playback starts */
                prebufferThreshold = Math.ceil(0.4 * playbackCtx.sampleRate);
                console.log('[audio] context created, native sampleRate:', playbackCtx.sampleRate,
                            'ring buffer:', ringBufferSize, 'samples');
            }
            if (playbackCtx.state === 'suspended') {
                playbackCtx.resume();
            }
            return playbackCtx;
        }

        function queueAudioChunk(base64Data, sampleRate) {
            var sr = sampleRate || 24000;
            var ctx = ensurePlaybackContext(sr);

            /* Decode base64 → Int16 PCM → Float32 */
            var binaryString = atob(base64Data);
            var bytes = new Uint8Array(binaryString.length);
            for (var i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            var int16 = new Int16Array(bytes.buffer);
            var float32 = new Float32Array(int16.length);
            for (var j = 0; j < int16.length; j++) {
                float32[j] = int16[j] / 32768.0;
            }

            /* Resample from source rate to context native rate if needed */
            var resampled;
            if (sr !== ctx.sampleRate) {
                var ratio = ctx.sampleRate / sr;
                var outLen = Math.ceil(float32.length * ratio);
                resampled = new Float32Array(outLen);
                for (var k = 0; k < outLen; k++) {
                    var srcIdx = k / ratio;
                    var idx0 = Math.floor(srcIdx);
                    var idx1 = Math.min(idx0 + 1, float32.length - 1);
                    var frac = srcIdx - idx0;
                    resampled[k] = float32[idx0] * (1 - frac) + float32[idx1] * frac;
                }
            } else {
                resampled = float32;
            }

            /* Write resampled audio into the ring buffer */
            for (var m = 0; m < resampled.length; m++) {
                audioRingBuffer[(ringWritePos + m) % ringBufferSize] = resampled[m];
            }
            ringWritePos = (ringWritePos + resampled.length) % ringBufferSize;

            console.debug('[audio] wrote', resampled.length, 'samples to ring buffer',
                          '(src:', float32.length, '@' + sr + 'Hz → native @' + ctx.sampleRate + 'Hz)');

            /* Start playback once we have enough buffered audio */
            if (!isPlayingAudio) {
                var buffered = bufferedSamples();
                if (!prebufferReached && buffered >= prebufferThreshold) {
                    prebufferReached = true;
                    console.log('[audio] prebuffer reached:', buffered, 'samples, starting playback');
                    startRingPlayback(ctx);
                } else if (prebufferReached) {
                    startRingPlayback(ctx);
                }
            }
        }

        function bufferedSamples() {
            if (ringWritePos >= ringReadPos) {
                return ringWritePos - ringReadPos;
            }
            return ringBufferSize - ringReadPos + ringWritePos;
        }

        function startRingPlayback(ctx) {
            if (isPlayingAudio) return;
            isPlayingAudio = true;

            /* Use ScriptProcessorNode as the pull-based audio sink.
               (AudioWorklet would be cleaner but requires a separate file
                or Blob URL registration; ScriptProcessorNode works inline
                and is still supported in all browsers as of 2026.) */
            var bufSize = 4096;  /* ~85ms at 48kHz — good balance of latency vs stability */
            var processor = ctx.createScriptProcessor(bufSize, 0, 1);

            processor.onaudioprocess = function (e) {
                var output = e.outputBuffer.getChannelData(0);
                var available = bufferedSamples();

                if (available === 0) {
                    /* Buffer underrun — output silence.  If no audio has
                       arrived for a while, we are done playing. */
                    for (var i = 0; i < output.length; i++) output[i] = 0;

                    /* Check if we should stop (response might be complete) */
                    if (prebufferReached) {
                        clearTimeout(processor._drainTimer);
                        processor._drainTimer = setTimeout(function () {
                            if (bufferedSamples() === 0 && isPlayingAudio) {
                                stopRingPlayback();
                            }
                        }, 500);
                    }
                    return;
                }

                /* Clear any pending drain timer since we have data */
                clearTimeout(processor._drainTimer);

                var toRead = Math.min(output.length, available);
                for (var i = 0; i < toRead; i++) {
                    output[i] = audioRingBuffer[(ringReadPos + i) % ringBufferSize];
                }
                ringReadPos = (ringReadPos + toRead) % ringBufferSize;

                /* Zero-fill any remaining output if we ran short */
                for (var i = toRead; i < output.length; i++) {
                    output[i] = 0;
                }
            };

            processor.connect(ctx.destination);
            playbackWorklet = processor;
            currentPlaybackSource = processor;  /* for barge-in detection */
            console.log('[audio] ring playback started (ScriptProcessor, bufSize=' + bufSize + ')');
        }

        function stopRingPlayback() {
            if (!isPlayingAudio) return;
            isPlayingAudio = false;

            if (playbackWorklet) {
                try { playbackWorklet.disconnect(); } catch (_) {}
                playbackWorklet = null;
            }
            currentPlaybackSource = null;
            currentGainNode = null;

            /* Reset ring buffer for next utterance */
            ringWritePos = 0;
            ringReadPos = 0;
            prebufferReached = false;

            console.log('[audio] ring playback stopped');
            onPlaybackComplete();
        }

        function onPlaybackComplete() {
            if (continuousMode) {
                setStatus('Ready to listen...', true);
                setTimeout(function () {
                    if (continuousMode && !isRecording) {
                        startRecording();
                    }
                }, 300);
            } else {
                setStatus('Ready');
            }
        }

        /* ================================================================
         *  AudioWorklet-based Recording
         * ================================================================ */
        async function initAudioWorklet() {
            if (!audioContext || audioContext.state === 'closed') {
                audioContext = new AudioContext({ sampleRate: 16000 });
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }

            /* Register the worklet processor inline via Blob URL */
            var workletCode = [
                'class AudioCapture extends AudioWorkletProcessor {',
                '  process(inputs) {',
                '    const input = inputs[0][0];',
                '    if (input) this.port.postMessage(input.slice());',
                '    return true;',
                '  }',
                '}',
                "registerProcessor('audio-capture', AudioCapture);"
            ].join('\n');

            var blob = new Blob([workletCode], { type: 'application/javascript' });
            var url = URL.createObjectURL(blob);

            try {
                await audioContext.audioWorklet.addModule(url);
            } catch (e) {
                /* Module may already be registered if we reconnected */
                if (!e.message.includes('already been')) {
                    throw e;
                }
            } finally {
                URL.revokeObjectURL(url);
            }
        }

        async function startRecording() {
            if (isRecording) return;

            try {
                /* Pre-create the playback AudioContext on this user gesture.
                   Chrome's autoplay policy requires AudioContext creation or
                   resume to happen inside a user-initiated event.  Without
                   this, audio chunks arriving later via WebSocket would be
                   silently dropped because the context stays suspended. */
                ensurePlaybackContext(24000);

                /* Acquire microphone stream (reuse if available) */
                if (!mediaStream || mediaStream.getTracks().every(function (t) { return t.readyState === 'ended'; })) {
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            sampleRate: 16000,
                            channelCount: 1,
                            echoCancellation: true,
                            noiseSuppression: true
                        }
                    });
                }

                await initAudioWorklet();

                sourceNode = audioContext.createMediaStreamSource(mediaStream);

                /* Analyser for waveform visualization */
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                analyserNode.smoothingTimeConstant = 0.7;
                sourceNode.connect(analyserNode);

                /* AudioWorkletNode for capturing PCM */
                workletNode = new AudioWorkletNode(audioContext, 'audio-capture');
                workletNode.port.onmessage = function (e) {
                    if (!isRecording) return;
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        var pcmFloat32 = e.data;
                        var base64 = float32ToBase64(pcmFloat32);
                        wsSend({ type: 'audio', data: base64 });

                        /* Update waveform data for visualization */
                        waveformData = pcmFloat32;
                    }
                };

                sourceNode.connect(workletNode);
                /* Worklet needs to be connected to destination (or a silent node) to process */
                workletNode.connect(audioContext.destination);

                isRecording = true;
                voiceBtn.classList.add('listening');
                voiceBtn.childNodes[0].textContent = continuousMode ? 'Listening...' : 'Listening...';

                wsSend({ type: 'start_listening' });

                startWaveformAnimation();

            } catch (err) {
                showError('Microphone error: ' + err.message);
                console.error('Recording start error:', err);
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            stopRecordingCleanup();

            if (ws && ws.readyState === WebSocket.OPEN) {
                wsSend({ type: 'stop_listening' });
            }
        }

        function stopRecordingCleanup() {
            isRecording = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.childNodes[0].textContent = continuousMode ? 'Tap to Talk' : 'Hold to Talk';
            vadDot.classList.remove('active');

            stopWaveformAnimation();

            if (workletNode) {
                try { workletNode.disconnect(); } catch (_) {}
                workletNode = null;
            }
            if (sourceNode) {
                try { sourceNode.disconnect(); } catch (_) {}
                sourceNode = null;
            }
            if (analyserNode) {
                try { analyserNode.disconnect(); } catch (_) {}
                analyserNode = null;
            }
            if (audioContext && audioContext.state !== 'closed') {
                audioContext.close().catch(function () {});
                audioContext = null;
            }

            /* Release mic unless continuous mode */
            if (!continuousMode && mediaStream) {
                mediaStream.getTracks().forEach(function (track) { track.stop(); });
                mediaStream = null;
            }
        }

        /* ================================================================
         *  Audio Encoding Utilities
         * ================================================================ */
        function float32ToBase64(float32Array) {
            var bytes = new Uint8Array(float32Array.buffer, float32Array.byteOffset, float32Array.byteLength);
            var binary = '';
            for (var i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        /* ================================================================
         *  Waveform Visualization
         * ================================================================ */
        function resizeCanvas() {
            var rect = waveformCanvas.getBoundingClientRect();
            var dpr = window.devicePixelRatio || 1;
            waveformCanvas.width = rect.width * dpr;
            waveformCanvas.height = rect.height * dpr;
            waveCtx.scale(dpr, dpr);
        }

        function startWaveformAnimation() {
            resizeCanvas();
            drawWaveframe();
        }

        function stopWaveformAnimation() {
            if (waveformAnimId) {
                cancelAnimationFrame(waveformAnimId);
                waveformAnimId = null;
            }
            /* Clear to idle state */
            drawIdleWaveform();
        }

        function drawWaveframe() {
            if (!isRecording) return;

            var rect = waveformCanvas.getBoundingClientRect();
            var w = rect.width;
            var h = rect.height;

            waveCtx.clearRect(0, 0, w, h);

            var bars = 48;
            var gap = 2;
            var barWidth = (w - gap * (bars - 1)) / bars;
            if (barWidth < 2) barWidth = 2;
            var step = Math.max(1, Math.floor(waveformData.length / bars));

            for (var i = 0; i < bars; i++) {
                /* Sample from waveform data */
                var idx = Math.min(i * step, waveformData.length - 1);
                var amplitude = Math.abs(waveformData[idx] || 0);
                /* Scale amplitude with some exaggeration for visual effect */
                var scaled = Math.min(amplitude * 4, 1.0);
                var barHeight = Math.max(2, scaled * (h - 8));

                var x = i * (barWidth + gap);
                var y = (h - barHeight) / 2;

                /* Gradient color based on amplitude */
                var r = 255;
                var g = Math.round(107 + (194 - 107) * (1 - scaled));
                var b = Math.round(53 + (247 - 53) * (1 - scaled));
                var alpha = 0.4 + scaled * 0.6;

                waveCtx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
                waveCtx.beginPath();
                waveCtx.roundRect(x, y, barWidth, barHeight, 2);
                waveCtx.fill();
            }

            waveformAnimId = requestAnimationFrame(drawWaveframe);
        }

        function drawIdleWaveform() {
            var rect = waveformCanvas.getBoundingClientRect();
            var w = rect.width;
            var h = rect.height;

            waveCtx.clearRect(0, 0, w, h);

            var bars = 48;
            var gap = 2;
            var barWidth = (w - gap * (bars - 1)) / bars;
            if (barWidth < 2) barWidth = 2;

            for (var i = 0; i < bars; i++) {
                var x = i * (barWidth + gap);
                var barHeight = 2;
                var y = (h - barHeight) / 2;
                waveCtx.fillStyle = 'rgba(255, 107, 53, 0.15)';
                waveCtx.beginPath();
                waveCtx.roundRect(x, y, barWidth, barHeight, 1);
                waveCtx.fill();
            }
        }

        /* ================================================================
         *  Event Listeners: Voice Button
         * ================================================================ */
        var pttDown = false;

        voiceBtn.addEventListener('mousedown', function (e) {
            if (continuousMode) return;
            pttDown = true;
            startRecording();
        });

        voiceBtn.addEventListener('mouseup', function () {
            if (continuousMode) return;
            if (pttDown) { pttDown = false; stopRecording(); }
        });

        voiceBtn.addEventListener('mouseleave', function () {
            if (continuousMode) return;
            if (pttDown) { pttDown = false; stopRecording(); }
        });

        voiceBtn.addEventListener('touchstart', function (e) {
            e.preventDefault();
            if (continuousMode) return;
            pttDown = true;
            startRecording();
        }, { passive: false });

        voiceBtn.addEventListener('touchend', function (e) {
            e.preventDefault();
            if (continuousMode) return;
            if (pttDown) { pttDown = false; stopRecording(); }
        });

        voiceBtn.addEventListener('click', function () {
            if (!continuousMode) return;
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        /* Spacebar toggle */
        document.addEventListener('keydown', function (e) {
            if (e.code === 'Space' && !e.repeat) {
                /* Don't capture if user is typing in an input */
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
                e.preventDefault();
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            }
        });

        /* ================================================================
         *  Event Listeners: Continuous Mode
         * ================================================================ */
        continuousToggle.addEventListener('change', function (e) {
            continuousMode = e.target.checked;
            voiceBtn.childNodes[0].textContent = continuousMode ? 'Tap to Talk' : 'Hold to Talk';

            if (continuousMode) {
                setStatus('Continuous mode ON - tap to start', true);
                /* Pre-request microphone permission */
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function (stream) { mediaStream = stream; })
                    .catch(function (err) { showError('Mic access needed: ' + err.message); });
            } else {
                setStatus('Ready');
                if (isRecording) stopRecording();
                if (mediaStream) {
                    mediaStream.getTracks().forEach(function (track) { track.stop(); });
                    mediaStream = null;
                }
            }
        });

        /* ================================================================
         *  Event Listeners: UI Controls
         * ================================================================ */
        clearBtn.addEventListener('click', function () {
            transcriptBody.innerHTML = '';
            partialTranscriptEl = null;
            currentResponseEl = null;
            streamingText = '';
        });

        settingsToggle.addEventListener('click', function () {
            settingsPanel.classList.toggle('open');
        });

        settingsCancel.addEventListener('click', function () {
            settingsPanel.classList.remove('open');
            loadSettings(); /* Revert unsaved changes */
        });

        settingsSave.addEventListener('click', function () {
            saveSettings();
            settingsPanel.classList.remove('open');
            /* Reconnect with new settings */
            sessionId = null;
            sessionIdLabel.textContent = '';
            if (isRecording) stopRecording();
            intentionalClose = true;
            connect();
        });

        /* ================================================================
         *  Window Resize Handler for Canvas
         * ================================================================ */
        var resizeTimeout = null;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function () {
                resizeCanvas();
                if (!isRecording) drawIdleWaveform();
            }, 100);
        });

        /* ================================================================
         *  Keep-Alive Ping (with dead-connection detection)
         * ================================================================ */
        setInterval(function () {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (!pageVisible) return;  /* don't ping in background tabs */

            /* If we haven't received a pong in 45s, the connection is dead */
            if (lastPongTime && (Date.now() - lastPongTime > 45000)) {
                console.warn('[ws] no pong in 45s, connection dead - reconnecting');
                ws.close();
                return;
            }

            wsSend({ type: 'ping' });
        }, 15000);  /* ping every 15s (Railway proxy timeout is ~60s) */

        /* ================================================================
         *  Initialization
         * ================================================================ */
        loadSettings();
        resizeCanvas();
        drawIdleWaveform();
        connect();

    })();
    </script>
</body>
</html>
